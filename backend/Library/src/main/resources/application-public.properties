spring.application.name=Library
server.port = 8081
server.ssl.enabled=true
server.ssl.key-store=classpath:localhost+2.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=your_keystore_password_here

stripe.key.secret=sk_test_your_stripe_secret_key_here

spring.datasource.url=jdbc:mysql://localhost:3306/reactlibrarydatabase?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-project.supabase.co/auth/v1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.data.rest.base-path=/api

